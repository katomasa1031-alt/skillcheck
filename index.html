<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>衛生士スキルチェック</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;--sur:#fff;--sur2:#f2f0ec;
  --bdr:rgba(0,0,0,.1);--bdr2:rgba(0,0,0,.18);
  --txt:#1a1a18;--txt2:#5a5a55;--txt3:#999990;
  --acc:#3d6b8c;--acc2:#e8f1f7;
  --grn:#3b6d11;--grn2:#eaf3de;
  --pur:#534ab7;--pur2:#eeedfe;
  --red:#a32d2d;--red2:#fcebeb;
  --r:10px;--rs:6px;
}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.6;-webkit-text-size-adjust:100%}

.app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
.topbar{background:var(--sur);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 14px;height:50px;flex-shrink:0;position:sticky;top:0;z-index:50}
.logo{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logo span{color:var(--acc)}
.logout-btn{margin-left:auto;flex-shrink:0;background:transparent;border:none;font-size:12px;color:var(--txt3);cursor:pointer;padding:4px 8px}
.pc-tabs{display:none;gap:6px;margin-left:10px;flex-shrink:0}
.tab-btn{padding:6px 14px;border:1px solid var(--bdr2);border-radius:20px;font-size:13px;cursor:pointer;background:transparent;color:var(--txt2);font-family:inherit}
.tab-btn.active{background:var(--acc);color:#fff;border-color:var(--acc)}

/* PC layout */
.pc-main{display:none;flex:1;overflow:hidden}
.sidebar{width:200px;flex-shrink:0;background:var(--sur);border-right:1px solid var(--bdr);overflow-y:auto;padding:10px 0}
.sb-sec{padding:4px 12px;font-size:11px;font-weight:600;color:var(--txt3);letter-spacing:.06em;margin-top:8px}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:13px;color:var(--txt2);border-left:3px solid transparent;transition:all .12s}
.sb-item:hover{background:var(--sur2)}
.sb-item.active{background:var(--acc2);color:var(--acc);border-left-color:var(--acc);font-weight:500}
.sb-pct{margin-left:auto;font-size:11px;font-weight:600}
.pc-view{flex:1;overflow-y:auto;padding:20px}

/* Mobile */
.mob-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px;padding-bottom:70px;max-width:100%}
.bot-nav{position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bdr);z-index:50;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.bot-nav::-webkit-scrollbar{display:none}
.bot-btn{flex-shrink:0;padding:13px 16px;border:none;border-top:2px solid transparent;background:transparent;color:var(--txt3);font-size:13px;font-family:inherit;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.bot-btn.active{color:var(--acc);border-top-color:var(--acc);font-weight:600;background:var(--acc2)}

/* Login */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-box{width:100%;max-width:340px}
.login-icon{font-size:36px;text-align:center;margin-bottom:10px}
.login-title{font-size:18px;font-weight:700;text-align:center;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--txt3);text-align:center;margin-bottom:28px}
.login-btn{width:100%;padding:16px;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.btn-primary{background:var(--acc);color:#fff}
.btn-outline{background:var(--sur);color:var(--txt);border:1px solid var(--bdr2)}
.pw-box{background:var(--sur);border:1px solid var(--bdr2);border-radius:var(--r);padding:16px;margin-top:8px}
.pw-input{width:100%;padding:10px;border:1px solid var(--bdr2);border-radius:var(--rs);font-size:16px;font-family:inherit;margin:10px 0;-webkit-appearance:none}
.pw-btn{width:100%;padding:12px;background:var(--acc);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

/* Trainee select */
.sel-btn{display:flex;align-items:center;gap:12px;padding:14px;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);cursor:pointer;margin-bottom:8px;width:100%;font-family:inherit;text-align:left;-webkit-tap-highlight-color:transparent}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--pur2);color:var(--pur);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}

/* Summary */
.summary{background:var(--acc);color:#fff;border-radius:var(--r);padding:14px;margin-bottom:14px}
.sum-pct{font-size:34px;font-weight:700;line-height:1;margin-bottom:4px}
.sum-sub{font-size:12px;opacity:.8;margin-bottom:8px}
.sum-bar{height:5px;border-radius:3px;background:rgba(255,255,255,.3);overflow:hidden}
.sum-fill{height:100%;border-radius:3px;background:#fff;transition:width .4s}

/* Category cards */
.cat-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.cat-head{display:flex;align-items:center;gap:8px;padding:12px 14px}
.cat-name{font-weight:600;font-size:13px;flex:1}
.cat-prog{font-size:12px;font-weight:600;color:var(--txt2)}
.cat-bar-w{width:50px;flex-shrink:0}
.cat-bar{height:4px;border-radius:2px;background:var(--sur2);overflow:hidden}
.cat-bar-f{height:100%;border-radius:2px;background:var(--acc);transition:width .3s}
.cat-body{border-top:1px solid var(--bdr)}

/* Task items */
.task{padding:12px 14px;border-bottom:1px solid var(--bdr)}
.task:last-child{border-bottom:none}
.task-row{display:flex;align-items:flex-start;gap:8px;width:100%}
.task-txt{flex:1;font-size:13px;line-height:1.55;min-width:0;word-break:break-all}
.task-txt.done{color:var(--txt3);text-decoration:line-through}

/* Check buttons */
.check-area{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.check-row{display:flex;align-items:center;gap:8px}
.check-lbl{font-size:11px;font-weight:600;min-width:52px;flex-shrink:0}
.lbl-self{color:var(--acc)}
.lbl-chief{color:var(--grn)}
.check-btn{width:44px;height:38px;border:1px solid var(--bdr2);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;background:var(--sur);-webkit-tap-highlight-color:transparent;transition:all .12s}
.check-btn.checked-self{background:var(--acc2);border-color:var(--acc)}
.check-btn.checked-chief{background:var(--grn2);border-color:var(--grn)}
.check-btn.readonly{cursor:default}

/* Admin view */
.admin-wrap{display:flex;flex-direction:column;gap:14px;width:100%;max-width:100%}
@media(min-width:640px){.admin-wrap{flex-direction:row;align-items:flex-start}.admin-list{width:260px;flex-shrink:0}.admin-detail{flex:1;min-width:0}}
.tc{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:13px;margin-bottom:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tc.sel{border-color:var(--acc);border-width:1.5px}
.tc-top{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.tc-name{font-weight:600;font-size:14px}
.tc-sub{font-size:12px;color:var(--txt3)}
.tc-pct{font-size:20px;font-weight:700;margin-left:auto}
.ov-bar{height:6px;border-radius:3px;background:var(--sur2);overflow:hidden}
.ov-fill{height:100%;border-radius:3px}
.fill-g{background:var(--grn)}.fill-a{background:#ef9f27}.fill-r{background:var(--red)}
.detail{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:16px}
.detail-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--bdr)}
.graph-box{background:var(--sur2);border-radius:var(--r);padding:13px;margin-bottom:12px}
.graph-title{font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:10px}
.sp-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.sp-name{font-size:12px;min-width:100px;color:var(--txt2)}
.sp-bar{flex:1;height:12px;background:var(--sur);border-radius:6px;overflow:hidden}
.sp-fill{height:100%;border-radius:6px;transition:width .4s}
.sp-pct{font-size:11px;font-weight:700;min-width:30px;text-align:right}
.ast-sheet{margin-top:16px}
.ast-head{font-size:13px;font-weight:600;color:var(--txt2);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.ast-cat-name{font-size:11px;font-weight:600;color:var(--txt3);margin:10px 0 5px;letter-spacing:.05em}
.ast-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bdr);font-size:13px}
.ast-item:last-child{border-bottom:none}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-both{background:var(--grn)}.dot-self{background:#ef9f27}.dot-none{background:#ccc}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:9px;font-weight:600;flex-shrink:0}
.b-both{background:var(--grn2);color:var(--grn)}
.b-self{background:#faeeda;color:#854f0b}
.b-none{background:var(--sur2);color:var(--txt3)}

/* Settings */
.set-sec{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:14px}
.set-sec h2{font-size:14px;font-weight:600;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--bdr)}
.t-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--bdr)}
.t-row:last-child{border-bottom:none}
.t-fields{flex:1;display:flex;flex-direction:column;gap:5px}
input[type=text]{border:1px solid var(--bdr2);border-radius:var(--rs);padding:8px 10px;font-size:16px;color:var(--txt);background:var(--bg);width:100%;font-family:inherit;-webkit-appearance:none}
input[type=text]:focus{outline:none;border-color:var(--acc);background:var(--sur)}
.btn{padding:9px 14px;border-radius:var(--rs);font-size:13px;cursor:pointer;border:1px solid var(--bdr2);background:var(--sur);color:var(--txt2);font-family:inherit}
.btn-danger{border-color:#f7c1c1;color:var(--red);background:var(--red2)}
.btn-acc{background:var(--acc);color:#fff;border-color:var(--acc)}
.btn-sm{padding:6px 10px;font-size:12px}
.info-box{background:var(--acc2);border:1px solid #b8d4e8;border-radius:var(--rs);padding:10px 13px;font-size:13px;color:var(--acc);margin-bottom:13px;line-height:1.6}
.sheet-sel{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.ss-btn{padding:5px 10px;border:1px solid var(--bdr2);border-radius:14px;font-size:12px;cursor:pointer;background:var(--sur);color:var(--txt2);font-family:inherit}
.ss-btn.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.edit-cat{border:1px solid var(--bdr);border-radius:var(--rs);margin-bottom:10px;overflow:hidden}
.edit-cat-head{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--sur2)}
.edit-items{padding:8px 12px}
.edit-item-row{display:flex;align-items:center;gap:6px;padding:4px 0}
.edit-item-row input{flex:1}

/* toast */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:var(--txt);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}

@media(min-width:640px){
  .pc-tabs{display:flex}
  .pc-main{display:flex}
  .mob-content,.bot-nav{display:none!important}
  .pc-view{padding:24px}
}
</style>
</head>

<script>

const SB_URL='https://flyjqpbapabwykyqtaye.supabase.co';
const SB_KEY='sb_publishable_zA9ZyYRQN_wHSmh1OXOWKg_1GYVG_Jb';
async function sbFetch(path,opts={}){
  const res=await fetch(SB_URL+path,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},method:opts.method||'GET',body:opts.body});
  const t=await res.text();return t?JSON.parse(t):null;
}
async function dbGet(key){try{const r=await sbFetch(`/rest/v1/settings?key=eq.${encodeURIComponent(key)}&select=value`);return r?.length?r[0].value:null;}catch(e){return null;}}
async function dbSet(key,value){try{await sbFetch('/rest/v1/settings',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify({key,value,updated_at:new Date().toISOString()})});}catch(e){}}
async function dbGetScores(){
  try{
    const rows=await sbFetch('/rest/v1/scores?select=*');
    const r={};
    (rows||[]).forEach(row=>{
      if(!r[row.trainee_id])r[row.trainee_id]={};
      if(!r[row.trainee_id][row.sheet_id])r[row.trainee_id][row.sheet_id]={};
      if(!r[row.trainee_id][row.sheet_id][row.cat_index])r[row.trainee_id][row.sheet_id][row.cat_index]={};
      r[row.trainee_id][row.sheet_id][row.cat_index][row.item_index]={self:row.self_score||0,admin:row.admin_score||0};
    });
    return r;
  }catch(e){return {};}
}
async function dbSaveScore(tid,sid,ci,ii,self,admin){
  const id=`${tid}__${sid}__${ci}__${ii}`;
  const body={id,trainee_id:tid,sheet_id:sid,cat_index:ci,item_index:ii,updated_at:new Date().toISOString()};
  if(self!==undefined)body.self_score=self;
  if(admin!==undefined)body.admin_score=admin;
  try{await sbFetch('/rest/v1/scores',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify(body)});}catch(e){}
}

// ============================================================
// SCORE HELPERS (0=未チェック, 1=チェック済み)
// ============================================================
function getSelf(tid,sid,ci,ii){try{return scores[tid][sid][ci][ii]?.self||0}catch(e){return 0}}
function getChief(tid,sid,ci,ii){try{return scores[tid][sid][ci][ii]?.admin||0}catch(e){return 0}}
function setScoreData(tid,sid,ci,ii,type,val){
  if(!scores[tid])scores[tid]={};
  if(!scores[tid][sid])scores[tid][sid]={};
  if(!scores[tid][sid][ci])scores[tid][sid][ci]={};
  if(!scores[tid][sid][ci][ii])scores[tid][sid][ci][ii]={self:0,admin:0};
  scores[tid][sid][ci][ii][type]=val;
}
function sheetPct(tid,sid){
  const s=SHEETS.find(x=>x.id===sid);if(!s)return 0;
  let tot=0,dn=0;
  s.categories.forEach((c,ci)=>c.items.forEach((_,ii)=>{tot++;if(getSelf(tid,sid,ci,ii))dn++;}));
  return tot?Math.round(dn/tot*100):0;
}
function totalPct(tid){
  let tot=0,dn=0;
  SHEETS.forEach(s=>s.categories.forEach((c,ci)=>c.items.forEach((_,ii)=>{tot++;if(getSelf(tid,s.id,ci,ii))dn++;})));
  return tot?Math.round(dn/tot*100):0;
}
function pCol(p){return p>=70?'var(--grn)':p>=40?'#ef9f27':'var(--red)'}
function pFill(p){return p>=70?'fill-g':p>=40?'fill-a':'fill-r'}
function ini(n){return n.split(/\s+/)[0]?.slice(0,2)||n.slice(0,2)}

async function loadAll(){
  TRAINEES=JSON.parse(JSON.stringify(DEFAULT_TRAINEES));
  SHEETS=JSON.parse(JSON.stringify(DEFAULT_SHEETS));
  try{
    const [t,s,sc]=await Promise.all([dbGet('trainees'),dbGet('sheets'),dbGetScores()]);
    if(t)TRAINEES=t;if(s)SHEETS=s;Object.assign(scores,sc);
  }catch(e){}
}
async function saveSettings(){
  try{await Promise.all([dbSet('trainees',TRAINEES),dbSet('sheets',SHEETS)]);}catch(e){}
}

// カテゴリHTML生成（衛生士・教育者共通）
function buildCategoryHTML(tid,sid,viewMode){
  const sheet=SHEETS.find(s=>s.id===sid);if(!sheet)return '';
  let h=`<div style="font-size:12px;color:var(--txt3);margin-bottom:10px">${sheet.subtitle}</div>`;
  sheet.categories.forEach((cat,ci)=>{
    let cd=0,ct=cat.items.length;
    cat.items.forEach((_,ii)=>{if(getSelf(tid,sid,ci,ii))cd++;});
    const cp=Math.round(cd/ct*100);
    h+=`<div class="cat-card"><div class="cat-head">
      <div class="cat-name">${cat.name}</div>
      <div class="cat-bar-w"><div class="cat-bar"><div class="cat-bar-f" style="width:${cp}%"></div></div></div>
      <div class="cat-prog">${cd}/${ct}</div>
    </div><div class="cat-body">`;
    cat.items.forEach((item,ii)=>{
      const sv=getSelf(tid,sid,ci,ii);
      const av=getChief(tid,sid,ci,ii);
      h+=`<div class="task"><div class="task-row">
        <div class="task-txt ${sv&&av?'done':''}">${item}</div>`;
      if(viewMode==='trainee'){
        // 衛生士：自己チェックボタン
        h+=`<div class="check-btn ${sv?'checked-self':''}" onclick="tToggleSelf(${ci},${ii})">${sv?'✓':''}</div>`;
      } else {
        // 教育者：衛生士チェック（読み取り）＋チーフチェック（常に表示）
        h+=`<div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:11px;color:var(--acc);font-weight:600;min-width:36px;text-align:right">衛生士</span>
            <div class="check-btn readonly ${sv?'checked-self':''}" style="width:36px;height:36px">${sv?'✓':''}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:11px;color:var(--grn);font-weight:600;min-width:36px;text-align:right">教育者</span>
            <div class="check-btn ${av?'checked-chief':''}" onclick="aToggleChief('${tid}','${sid}',${ci},${ii})" style="width:36px;height:36px">${av?'✓':''}</div>
          </div>
        </div>`;
      }
      h+=`</div></div>`;
    });
    h+=`</div></div>`;
  });
  return h;
}

function aSwitch(v){
  currentView=v;
  ['trainee','admin','settings'].forEach(tab=>{
    const el=document.getElementById('ptab-'+tab);
    if(el)el.className='tab-btn'+(tab===v?' active':'');
  });
  const pcMain=document.getElementById('pc-sidebar')?.closest('.pc-main')||document.querySelector('.pc-main');
  const mobContent=document.getElementById('main-content');
  if(window.innerWidth>=640){
    // PC
    if(pcMain)pcMain.style.display='flex';
    if(mobContent)mobContent.style.display='none';
    const botNav=document.getElementById('bot-nav');
    if(botNav)botNav.style.display='none';
    renderAdminPC();
  } else {
    // スマホ
    if(pcMain)pcMain.style.display='none';
    if(mobContent)mobContent.style.display='block';
    const botNav=document.getElementById('bot-nav');
    if(botNav)botNav.style.display='flex';
    updateAdminBotNav();
    renderAdminMob();
  }
}
function updateAdminBotNav(){
  const v=currentView;
  if(v==='trainee'){
    // 衛生士チェックシート表示中はシートタブ
    renderIn('bot-nav',SHEETS.map(s=>`<button class="bot-btn ${s.id===currentSheet?'active':''}" onclick="aSelSheet('${s.id}')">${s.subtitle}</button>`).join(''));

    // 4名の名前＋設定ボタン
    let h=TRAINEES.map(t=>`<button class="bot-btn ${adminSelected===t.id&&v==='admin'?'active':''}" onclick="aSwitchToTrainee('${t.id}')">${t.name.split(/\s+/)[0]}</button>`).join('');
    h+=`<button class="bot-btn ${v==='settings'?'active':''}" onclick="aSwitch('settings')">⚙️設定</button>`;
    renderIn('bot-nav',h);
  }
}
function aSwitchToTrainee(tid){
  adminSelected=tid;
  selfId=tid;
  currentView='admin';
  currentSheet='s1';
  if(window.innerWidth>=640){
    renderAdminPC();
  } else {
    updateAdminBotNav();
    renderAdminMob();
  }
}

  TRAINEES.forEach(t=>{
    const p=totalPct(t.id);
    sb+=`<div class="sb-item ${t.id===adminSelected&&currentView==='admin'?'active':''}" onclick="aSwitchToTrainee('${t.id}')">${t.name}<span class="sb-pct" style="color:${pCol(p)}">${p}%</span></div>`;
  });
  if(currentView==='settings')sb='<div class="sb-sec">管理</div><div class="sb-item active">設定</div>';
  renderIn('pc-sidebar',sb);
  if(currentView==='admin') renderIn('pc-view',buildAdminPersonHTML());
  else if(currentView==='trainee') renderIn('pc-view',buildAdminTraineeHTML());
  else if(currentView==='settings') renderIn('pc-view',buildSettingsHTML());
}
function aSelTrainee(id){selfId=id;adminSelected=id;currentSheet='s1';aSwitch('trainee');}
function aSelSheet(id){currentSheet=id;if(currentView==='admin')aSwitchToTrainee(adminSelected);else aSwitch('trainee');}
function aSelAdmin(id){aSwitchToTrainee(id);}
function aToggleChief(tid,sid,ci,ii){
  const cur=getChief(tid,sid,ci,ii);
  const nv=cur?0:1;
  setScoreData(tid,sid,ci,ii,'admin',nv);
  dbSaveScore(tid,sid,ci,ii,undefined,nv);
  if(currentView==='admin')aSwitchToTrainee(adminSelected);else aSwitch(currentView);
}

// 教育者の衛生士タブ（isTraineeMode=trueなら衛生士モードとして使用）
function buildAdminTraineeHTML(isTraineeMode){
  if(!selfId)selfId=TRAINEES[0]?.id;
  const t=TRAINEES.find(x=>x.id===selfId);
  const overall=totalPct(selfId);
  let h='<div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px;-webkit-overflow-scrolling:touch;scrollbar-width:none">';
  TRAINEES.forEach(t2=>{
    const p=totalPct(t2.id);
    const onclick=isTraineeMode?`selfId='${t2.id}';currentSheet='s1';renderMyProgress()`:`aSelTrainee('${t2.id}')`;
    h+=`<div onclick="${onclick}" style="display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;cursor:pointer;padding:4px 6px;-webkit-tap-highlight-color:transparent">
      <div class="avatar" style="${t2.id===selfId?'border:2.5px solid var(--acc)':''}">${ini(t2.name)}</div>
      <div style="font-size:11px;white-space:nowrap">${t2.name.split(/\s+/)[0]}</div>
      <div style="font-size:11px;font-weight:700;color:${pCol(p)}">${p}%</div>
    </div>`;
  });
  h+=`</div>
  <div class="summary">
    <div style="font-size:12px;opacity:.8;margin-bottom:2px">${t.name}</div>
    <div class="sum-pct">${overall}%</div>
    <div class="sum-sub">自己チェック済み</div>
    <div class="sum-bar"><div class="sum-fill" style="width:${overall}%"></div></div>
  </div>
  <div style="display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:3px;-webkit-overflow-scrolling:touch;scrollbar-width:none">`;
  const sheetSelectFn=isTraineeMode?`tSelSheet`:`aSelSheet`;
  SHEETS.forEach(s=>{
    const p=sheetPct(selfId,s.id);
    h+=`<button onclick="${sheetSelectFn}('${s.id}')" style="flex-shrink:0;padding:6px 12px;border:1px solid ${s.id===currentSheet?'var(--acc)':'var(--bdr2)'};border-radius:20px;font-size:12px;cursor:pointer;background:${s.id===currentSheet?'var(--acc)':'var(--sur)'};color:${s.id===currentSheet?'#fff':'var(--txt2)'};white-space:nowrap;font-family:inherit">${s.subtitle} ${p}%</button>`;
  });
  h+='</div>';
  h+=buildCategoryHTML(selfId,currentSheet,isTraineeMode?'trainee':'admin');
  return h;
}

// 教育者が一人を選んで確認・入力する画面
function buildAdminPersonHTML(){
  if(!adminSelected)adminSelected=TRAINEES[0]?.id;
  selfId=adminSelected;
  const t=TRAINEES.find(x=>x.id===adminSelected);
  const overall=totalPct(adminSelected);
  let tot=0,selfDn=0,chiefDn=0;
  SHEETS.forEach(s=>s.categories.forEach((c,ci)=>c.items.forEach((_,ii)=>{tot++;if(getSelf(adminSelected,s.id,ci,ii))selfDn++;if(getChief(adminSelected,s.id,ci,ii))chiefDn++;})));
  let h=`
  <div class="summary">
    <div style="font-size:12px;opacity:.8;margin-bottom:2px">${t.name}</div>
    <div class="sum-pct">${overall}%</div>
    <div class="sum-sub">自己 ${selfDn} / 教育者 ${chiefDn} / 全${tot}</div>
    <div class="sum-bar"><div class="sum-fill" style="width:${overall}%"></div></div>
  </div>
  <div style="display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:3px;-webkit-overflow-scrolling:touch;scrollbar-width:none">`;
  SHEETS.forEach(s=>{
    const p=sheetPct(adminSelected,s.id);
    h+=`<button onclick="currentSheet='${s.id}';aSwitchToTrainee('${adminSelected}')" style="flex-shrink:0;padding:6px 12px;border:1px solid ${s.id===currentSheet?'var(--acc)':'var(--bdr2)'};border-radius:20px;font-size:12px;cursor:pointer;background:${s.id===currentSheet?'var(--acc)':'var(--sur)'};color:${s.id===currentSheet?'#fff':'var(--txt2)'};white-space:nowrap;font-family:inherit">${s.subtitle} ${p}%</button>`;
  });
  h+='</div>';
  h+=buildCategoryHTML(adminSelected,currentSheet,'admin');
  return h;
}

// 設定画面
function buildSettingsHTML(){
  const sheet=SHEETS.find(s=>s.id===settingsSheet);
  const sIdx=SHEETS.findIndex(s=>s.id===settingsSheet);
  let h=`<div class="info-box">💡 このページで直接編集するか、Claudeに依頼することができます。</div>
  <div class="set-sec"><h2>👤 衛生士の管理</h2>`;
  TRAINEES.forEach((t,ti)=>{
    h+=`<div class="t-row">
      <div class="avatar" style="width:32px;height:32px;font-size:11px">${ini(t.name)}</div>
      <div class="t-fields">
        <input type="text" value="${t.name}" placeholder="名前" oninput="TRAINEES[${ti}].name=this.value;saveSettings()">
        <input type="text" value="${t.joined}" placeholder="入社年月" oninput="TRAINEES[${ti}].joined=this.value;saveSettings()">
      </div>
      <button class="btn btn-danger btn-sm" onclick="if(confirm('削除？')){TRAINEES.splice(${ti},1);saveSettings();aSwitch(currentView);}">削除</button>
    </div>`;
  });
  h+=`<div style="margin-top:12px;display:flex;flex-direction:column;gap:8px">
    <input type="text" id="new-name" placeholder="名前">
    <input type="text" id="new-join" placeholder="入社年月（例：2026年4月）">
    <button class="btn btn-acc" onclick="addTrainee()">+ 追加</button>
  </div></div>
  <div class="set-sec"><h2>📝 チェック項目の編集</h2>
  <div class="sheet-sel">`;
  SHEETS.forEach(s=>{
    h+=`<button class="ss-btn ${s.id===settingsSheet?'active':''}" onclick="settingsSheet='${s.id}';aSwitch(currentView)">${s.subtitle}</button>`;
  });
  h+=`</div>`;
  sheet.categories.forEach((cat,ci)=>{
    h+=`<div class="edit-cat">
      <div class="edit-cat-head">
        <input type="text" value="${cat.name}" style="flex:1;background:transparent;border:none;border-bottom:1px solid var(--bdr2);border-radius:0;font-weight:600;padding:4px" oninput="SHEETS[${sIdx}].categories[${ci}].name=this.value;saveSettings()">
        <button class="btn btn-danger btn-sm" onclick="if(confirm('削除？')){SHEETS[${sIdx}].categories.splice(${ci},1);saveSettings();aSwitch(currentView);}">削除</button>
      </div>
      <div class="edit-items">`;
    cat.items.forEach((item,ii)=>{
      h+=`<div class="edit-item-row">
        <input type="text" value="${item}" oninput="SHEETS[${sIdx}].categories[${ci}].items[${ii}]=this.value;saveSettings()">
        <button class="btn btn-danger btn-sm" onclick="SHEETS[${sIdx}].categories[${ci}].items.splice(${ii},1);saveSettings();aSwitch(currentView)">×</button>
      </div>`;
    });
    h+=`<div style="display:flex;gap:6px;margin-top:6px">
        <input type="text" id="ni-${sIdx}-${ci}" placeholder="新しい項目..." style="flex:1;font-size:12px">
        <button class="btn btn-acc btn-sm" onclick="addItem(${sIdx},${ci})">追加</button>
      </div></div></div>`;
  });
  h+=`<div style="display:flex;gap:8px;margin-top:10px">
    <input type="text" id="new-cat" placeholder="新しいカテゴリ名" style="flex:1">
    <button class="btn btn-acc btn-sm" onclick="addCat(${sIdx})">+ カテゴリ</button>
  </div></div>`;
  return h;
}
function addTrainee(){
  const name=document.getElementById('new-name')?.value.trim();
  const join=document.getElementById('new-join')?.value.trim();
  if(!name)return;
  TRAINEES.push({id:'t'+Date.now(),name,joined:join||''});
  saveSettings();toast('追加しました');aSwitch(currentView);
}
function addItem(si,ci){
  const inp=document.getElementById(`ni-${si}-${ci}`);
  if(!inp?.value.trim())return;
  SHEETS[si].categories[ci].items.push(inp.value.trim());
  saveSettings();toast('追加しました');aSwitch(currentView);
}
function addCat(si){
  const inp=document.getElementById('new-cat');
  if(!inp?.value.trim())return;
  SHEETS[si].categories.push({name:inp.value.trim(),items:[]});
  saveSettings();toast('追加しました');aSwitch(currentView);
}

// INIT
// ============================================================
(async()=>{
  await loadAll();
  renderLogin();
})();
</script>
