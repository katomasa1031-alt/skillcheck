<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>衛生士スキルチェックシート</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3; --surface: #ffffff; --surface2: #f2f0ec;
    --border: rgba(0,0,0,0.10); --border2: rgba(0,0,0,0.18);
    --text: #1a1a18; --text2: #5a5a55; --text3: #999990;
    --accent: #3d6b8c; --accent-light: #e8f1f7;
    --green: #3b6d11; --green-bg: #eaf3de;
    --amber: #854f0b; --amber-bg: #faeeda;
    --red: #a32d2d; --red-bg: #fcebeb;
    --purple: #534ab7; --purple-bg: #eeedfe;
    --radius: 10px; --radius-sm: 6px;
  }
  body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; -webkit-text-size-adjust: 100%; }

  /* ===== LAYOUT ===== */
  .app { display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }

  /* トップバー */
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; height: 52px; position: sticky; top: 0; z-index: 100; flex-shrink: 0; }
  .topbar-logo { font-size: 14px; font-weight: 600; color: var(--text); }
  .topbar-logo span { color: var(--accent); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  /* メインコンテンツ */
  .content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px; }
  .view { display: none; }
  .view.active { display: block; }

  /* ===== ボトムナビ（シートタブ） ===== */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
  .sheet-tab-nav { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .sheet-tab-nav::-webkit-scrollbar { display: none; }
  .sheet-tab-btn { flex-shrink: 0; padding: 10px 14px; border: none; border-top: 2px solid transparent; background: transparent; color: var(--text3); font-size: 12px; font-family: inherit; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; transition: all .15s; }
  .sheet-tab-btn.active { color: var(--accent); border-top-color: var(--accent); font-weight: 600; background: var(--accent-light); }
  /* 教育者モード用ナビ（衛生士/教育者/設定の3タブ） */
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 4px; cursor: pointer; border: none; background: transparent; color: var(--text3); font-size: 10px; font-family: inherit; gap: 3px; transition: color .15s; -webkit-tap-highlight-color: transparent; }
  .nav-btn .nav-icon { font-size: 20px; line-height: 1; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn.active .nav-icon { transform: scale(1.1); }

  /* ===== 衛生士セレクター ===== */
  .trainee-selector { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .trainee-selector::-webkit-scrollbar { display: none; }
  .ts-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; cursor: pointer; padding: 4px 8px; border-radius: var(--radius); transition: background .12s; -webkit-tap-highlight-color: transparent; }
  .ts-btn.active .ts-avatar { border: 2.5px solid var(--accent); }
  .ts-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--purple-bg); color: var(--purple); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; border: 2.5px solid transparent; transition: border-color .15s; }
  .ts-name { font-size: 11px; color: var(--text2); white-space: nowrap; }
  .ts-pct { font-size: 11px; font-weight: 700; }

  /* ===== サマリーカード ===== */
  .summary-card { background: var(--accent); color: #fff; border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .summary-name { font-size: 13px; opacity: .8; margin-bottom: 2px; }
  .summary-pct { font-size: 36px; font-weight: 700; line-height: 1; margin-bottom: 8px; }
  .summary-sub { font-size: 12px; opacity: .75; margin-bottom: 10px; }
  .summary-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.3); overflow: hidden; }
  .summary-bar-fill { height: 100%; border-radius: 3px; background: #fff; transition: width .5s; }

  /* ===== シートスクロールタブ ===== */
  .sheet-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .sheet-scroll::-webkit-scrollbar { display: none; }
  .sheet-chip { padding: 7px 14px; border: 1px solid var(--border2); border-radius: 20px; font-size: 13px; cursor: pointer; background: var(--surface); color: var(--text2); white-space: nowrap; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
  .sheet-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ===== カテゴリカード ===== */
  .cat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
  .cat-header { display: flex; align-items: center; gap: 10px; padding: 13px 14px; user-select: none; }
  .cat-name { font-weight: 600; font-size: 14px; flex: 1; }
  .cat-bar-wrap { width: 60px; }
  .cat-bar { height: 4px; border-radius: 2px; background: var(--surface2); overflow: hidden; }
  .cat-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width .3s; }
  .cat-pct { font-size: 12px; font-weight: 600; color: var(--text2); min-width: 30px; text-align: right; }
  .cat-chevron { font-size: 10px; color: var(--text3); transition: transform .2s; }
  .cat-card.collapsed .cat-chevron { transform: rotate(-90deg); }
  .cat-card.collapsed .cat-body { display: none; }
  .cat-body { border-top: 1px solid var(--border); }

  /* ===== タスク行 ===== */
  .task-item { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .task-item:last-child { border-bottom: none; }
  .task-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .task-num { font-size: 11px; color: var(--text3); min-width: 18px; margin-top: 2px; flex-shrink: 0; }
  .task-text { flex: 1; font-size: 14px; line-height: 1.55; }
  .task-text.done { color: var(--text3); text-decoration: line-through; }
  .stars { display: flex; gap: 4px; }
  .star { width: 44px; height: 44px; flex-shrink: 0; border: 1px solid var(--border2); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 15px; font-weight: 600; color: var(--text3); background: var(--surface); transition: all .12s; -webkit-tap-highlight-color: transparent; }
  .star.active { background: var(--amber-bg); color: var(--amber); border-color: var(--amber); }
  .self-star { color: var(--text3); }
  .self-star.active { background: #e8f1f7; color: var(--accent); border-color: var(--accent); }
  .admin-star { color: var(--text3); }
  .admin-star.admin-active { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .admin-star-disp { width: 44px; height: 44px; flex-shrink: 0; border: 1px solid var(--border2); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; color: var(--text3); background: var(--surface); cursor: default; }
  .admin-star-disp.admin-active { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .s-star.admin-on { color: var(--green); }

  /* ===== 教育者ビュー ===== */
  .tc { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .tc.selected { border-color: var(--accent); border-width: 1.5px; }
  .tc-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .tc-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--purple-bg); color: var(--purple); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
  .tc-name { font-weight: 600; font-size: 15px; }
  .tc-sub { font-size: 12px; color: var(--text3); }
  .tc-pct { font-size: 22px; font-weight: 700; margin-left: auto; }
  .overall-bar { height: 6px; border-radius: 3px; background: var(--surface2); overflow: hidden; }
  .overall-fill { height: 100%; border-radius: 3px; transition: width .4s; }
  .fill-green { background: var(--green); } .fill-amber { background: #ef9f27; } .fill-red { background: #e24b4a; }

  /* 詳細パネル */
  .detail-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-top: 14px; }
  .admin-layout { display: flex; flex-direction: column; gap: 16px; }
  @media (min-width: 640px) { .admin-layout { flex-direction: row; align-items: flex-start; } .admin-layout .trainee-cards { width: 260px; flex-shrink: 0; } .admin-layout .detail-panel { flex: 1; margin-top: 0; } }
  .detail-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .sp-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .sp-name { font-size: 13px; flex: 1; }
  .sp-bar { height: 6px; border-radius: 3px; background: var(--surface2); overflow: hidden; width: 80px; flex-shrink: 0; }
  .sp-fill { height: 100%; border-radius: 3px; transition: width .3s; }
  .sp-pct { font-size: 12px; font-weight: 600; min-width: 32px; text-align: right; }
  .ast-sheet { margin-top: 18px; }
  .ast-header { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
  .ast-cat-name { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .05em; margin: 10px 0 4px; }
  .ast-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .ast-item:last-child { border-bottom: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-g { background: var(--green); } .dot-a { background: #ef9f27; } .dot-x { background: #ccc; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 9px; font-weight: 600; flex-shrink: 0; }
  .b-done { background: var(--green-bg); color: var(--green); }
  .b-wip { background: var(--amber-bg); color: var(--amber); }
  .b-todo { background: var(--surface2); color: var(--text3); }
  .s-star { font-size: 11px; }
  .s-star.on { color: var(--amber); } .s-star.off { color: #ddd; }

  /* ===== 設定ビュー ===== */
  .settings-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
  .settings-section h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .trainee-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .trainee-row:last-child { border-bottom: none; }
  .te-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--purple-bg); color: var(--purple); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .te-fields { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  input[type=text], input[type=text]:not([class]) { border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 14px; color: var(--text); background: var(--bg); width: 100%; font-family: inherit; transition: border-color .15s; -webkit-appearance: none; }
  input[type=text]:focus { outline: none; border-color: var(--accent); background: var(--surface); }
  .btn { padding: 10px 16px; border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); transition: all .15s; font-family: inherit; -webkit-tap-highlight-color: transparent; }
  .btn-danger { border-color: #f7c1c1; color: var(--red); background: var(--red-bg); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-sm { padding: 7px 12px; font-size: 13px; }
  .btn-block { width: 100%; text-align: center; margin-top: 8px; }
  .sheet-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .ss-btn { padding: 6px 12px; border: 1px solid var(--border2); border-radius: 15px; font-size: 12px; cursor: pointer; background: var(--surface); color: var(--text2); }
  .ss-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .edit-cat { border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 10px; overflow: hidden; }
  .edit-cat-header { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: var(--surface2); }
  .edit-items { padding: 8px 12px; }
  .edit-item-row { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
  .edit-item-row input { flex: 1; }
  .info-box { background: var(--accent-light); border: 1px solid #b8d4e8; border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; color: var(--accent); margin-bottom: 14px; line-height: 1.6; }
  .json-area { width: 100%; height: 120px; border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 8px; font-size: 11px; font-family: 'Courier New', monospace; color: var(--text); background: var(--bg); resize: vertical; }
  .btn-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }

  /* Toast */
  .toast { position: fixed; bottom: 76px; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* PC用レイアウト */
  .main { display: flex; height: calc(100vh - 52px); overflow: hidden; }
  .sidebar { width: 210px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 12px 0; }
  .sb-section { padding: 4px 12px; font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .06em; margin-top: 8px; }
  .sb-item { display: flex; align-items: center; gap: 8px; padding: 8px 16px; cursor: pointer; font-size: 13px; color: var(--text2); border-left: 3px solid transparent; transition: all .12s; }
  .sb-item:hover { background: var(--surface2); color: var(--text); }
  .sb-item.active { background: var(--accent-light); color: var(--accent); border-left-color: var(--accent); font-weight: 500; }
  .sb-pct { margin-left: auto; font-size: 11px; font-weight: 600; }
  .view-btn { padding: 6px 14px; border: 1px solid var(--border2); border-radius: 20px; font-size: 13px; cursor: pointer; background: transparent; color: var(--text2); transition: all .15s; white-space: nowrap; }
  .view-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  /* PC/スマホ切替 */
  .desktop-only { display: none !important; }
  .mobile-only { display: block; }
  .mobile-only.bottom-nav { display: flex; }
  #mobile-content { display: block; flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px; }
  @media (min-width: 640px) {
    .desktop-only { display: flex !important; }
    .mobile-only { display: none !important; }
    .bottom-nav { display: none !important; }
    .content { max-width: none; padding: 24px; padding-bottom: 24px; }
    .main .content { flex: 1; overflow-y: auto; }
  }

  @media print {
    .topbar, .bottom-nav { display: none !important; }
    .content { padding: 0; }
  }
</style>
</head>

<div id="app-root"></div>
<div class="toast" id="toast"></div>

<script>
// ===== SUPABASE =====
const SB_URL = 'https://flyjqpbapabwykyqtaye.supabase.co';
const SB_KEY = 'sb_publishable_zA9ZyYRQN_wHSmh1OXOWKg_1GYVG_Jb';

async function sbFetch(path, opts={}) {
  const res = await fetch(SB_URL + path, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation', ...opts.headers },
    ...opts
  });
  if (!res.ok) { const t = await res.text(); throw new Error(t); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function dbGetSetting(key) {
  try {
    const rows = await sbFetch(`/rest/v1/settings?key=eq.${encodeURIComponent(key)}&select=value`);
    return rows?.length ? rows[0].value : null;
  } catch(e) { return null; }
}
async function dbSetSetting(key, value) {
  await sbFetch('/rest/v1/settings', {
    method: 'POST',
    headers: { 'Prefer': 'resolution=merge-duplicates,return=representation' },
    body: JSON.stringify({ key, value, updated_at: new Date().toISOString() })
  });
}
async function dbGetAllScores() {
  try {
    const rows = await sbFetch('/rest/v1/scores?select=*');
    const result = {};
    (rows||[]).forEach(r => {
      if (!result[r.trainee_id]) result[r.trainee_id] = {};
      if (!result[r.trainee_id][r.sheet_id]) result[r.trainee_id][r.sheet_id] = {};
      if (!result[r.trainee_id][r.sheet_id][r.cat_index]) result[r.trainee_id][r.sheet_id][r.cat_index] = {};
      result[r.trainee_id][r.sheet_id][r.cat_index][r.item_index] = {
        self: r.self_score || 0,
        admin: r.admin_score || 0
      };
    });
    return result;
  } catch(e) { return {}; }
}
async function dbSetScore(tid, sid, ci, ii, selfScore, adminScore) {
  const id = `${tid}__${sid}__${ci}__${ii}`;
  const body = { id, trainee_id: tid, sheet_id: sid, cat_index: ci, item_index: ii, updated_at: new Date().toISOString() };
  if (selfScore !== undefined) body.self_score = selfScore;
  if (adminScore !== undefined) body.admin_score = adminScore;
  await sbFetch('/rest/v1/scores', {
    method: 'POST',
    headers: { 'Prefer': 'resolution=merge-duplicates,return=representation' },
    body: JSON.stringify(body)
  });
}

// ============================================================
// ██████╗  █████╗ ████████╗ █████╗
// ██╔══██╗██╔══██╗╚══██╔══╝██╔══██╗
// ██║  ██║███████║   ██║   ███████║
// ██║  ██║██╔══██║   ██║   ██╔══██║
// ██████╔╝██║  ██║   ██║   ██║  ██║
// ╚═════╝ ╚═╝  ╚═╝   ╚═╝   ╚═╝  ╚═╝
//
// ★ Claudeへの編集ガイド ★
// ─────────────────────────────────────────────────────────────
// 【衛生士名を変更】→ TRAINEES 配列を編集
//   例: name: '田中 花子', trainer: '山田 DH', joined: '2025年4月'
//
// 【項目を追加・変更】→ SHEETS 配列の該当 items を編集
//   例: items: ['新しい項目を追加', '...']
//
// 【カテゴリを追加】→ categories 配列に追記
//   例: { name: '新カテゴリ名', items: ['項目1', '項目2'] }
//
// 【シートを追加】→ SHEETS 配列に新しいオブジェクトを追記
//   id は 's8', 's9'... と一意にすること
// ─────────────────────────────────────────────────────────────

// ============================================================
// 衛生士一覧（ここを編集してください）
// ============================================================
const DEFAULT_TRAINEES = [
  { id: 't1', name: '戸羽 陽花', initials: '戸羽', joined: '2026年4月', trainer: 'チーフ' },
  { id: 't2', name: '土屋 涼寧', initials: '土屋', joined: '2026年4月', trainer: 'チーフ' },
  { id: 't3', name: '柏木 結希', initials: '柏木', joined: '2026年4月', trainer: 'チーフ' },
  { id: 't4', name: '露木 紗奈', initials: '露木', joined: '2026年4月', trainer: 'チーフ' }
];

// ============================================================
// チェックシートデータ（ここを編集してください）
// ============================================================
const DEFAULT_SHEETS = [
  {
    id: 's1', title: 'チェックシート①', subtitle: '挨拶・患者対応・カルテ・口腔内写真',

// ===== RUNTIME STATE =====
let TRAINEES, SHEETS_DATA;
const scores = {}; // scores[tid][sid][ci][ii] = 0-5
let dbReady = false;

async function loadAll() {
  // まずデフォルトで起動（表示を速くするため）
  TRAINEES = JSON.parse(JSON.stringify(DEFAULT_TRAINEES));
  SHEETS_DATA = JSON.parse(JSON.stringify(DEFAULT_SHEETS));

  try {
    showLoadingBanner('Supabaseからデータを読み込み中...');
    const [traineesSetting, sheetsSetting, dbScores] = await Promise.all([
      dbGetSetting('trainees'),
      dbGetSetting('sheets'),
      dbGetAllScores()
    ]);
    if (traineesSetting) TRAINEES = traineesSetting;
    if (sheetsSetting) SHEETS_DATA = sheetsSetting;
    Object.assign(scores, dbScores);
    dbReady = true;
    hideLoadingBanner();
  } catch(e) {
    hideLoadingBanner();
    showErrorBanner('オフラインモード：データの同期ができませんでした');
    console.error(e);
  }
}

async function saveAll() {
  // ローカルにも保存（オフライン対応）
  localStorage.setItem('skillcheck_v3_cache', JSON.stringify({ trainees: TRAINEES, sheets: SHEETS_DATA }));
  if (!dbReady) return;
  try {
    await Promise.all([
      dbSetSetting('trainees', TRAINEES),
      dbSetSetting('sheets', SHEETS_DATA)
    ]);
  } catch(e) { console.error('save error', e); }
}

function showLoadingBanner(msg) {
  let el = document.getElementById('sync-banner');
  if (!el) { el = document.createElement('div'); el.id='sync-banner'; el.style.cssText='position:fixed;top:56px;left:0;right:0;background:#3d6b8c;color:#fff;text-align:center;padding:6px;font-size:13px;z-index:200'; document.body.appendChild(el); }
  el.textContent = msg; el.style.display='block';
}
function hideLoadingBanner() { const el=document.getElementById('sync-banner'); if(el) el.style.display='none'; }
function showErrorBanner(msg) {
  let el = document.getElementById('sync-banner');
  if (!el) { el = document.createElement('div'); el.id='sync-banner'; el.style.cssText='position:fixed;top:56px;left:0;right:0;text-align:center;padding:6px;font-size:13px;z-index:200'; document.body.appendChild(el); }
  el.style.background='#854f0b'; el.style.color='#fff'; el.textContent=msg; el.style.display='block';
  setTimeout(() => { el.style.display='none'; }, 4000);
}

// ===== SCORE HELPERS =====
function getSelfScore(tid, sid, ci, ii) {
  try { return scores[tid][sid][ci][ii]?.self || 0; } catch(e) { return 0; }
}
function getAdminScore(tid, sid, ci, ii) {
  try { return scores[tid][sid][ci][ii]?.admin || 0; } catch(e) { return 0; }
}
function setScoreData(tid, sid, ci, ii, type, val) {
  if (!scores[tid]) scores[tid] = {};
  if (!scores[tid][sid]) scores[tid][sid] = {};
  if (!scores[tid][sid][ci]) scores[tid][sid][ci] = {};
  if (!scores[tid][sid][ci][ii]) scores[tid][sid][ci][ii] = { self: 0, admin: 0 };
  scores[tid][sid][ci][ii][type] = val;
  saveAll();
}
function calcItemScore(self, admin) {
  const vals = [self, admin].filter(v => v > 0);
  return vals.length ? vals.reduce((a,b)=>a+b,0) / vals.length : 0;
}
function sheetPct(tid, sid) {
  const s = SHEETS_DATA.find(x => x.id === sid); if (!s) return 0;
  let totalMax = 0, totalScore = 0;
  s.categories.forEach((c,ci) => c.items.forEach((_,ii) => {
    totalMax += 5;
    totalScore += calcItemScore(getSelfScore(tid,sid,ci,ii), getAdminScore(tid,sid,ci,ii));
  }));
  return totalMax ? Math.round(totalScore / totalMax * 100) : 0;
}
function totalPct(tid) {
  let totalMax = 0, totalScore = 0;
  SHEETS_DATA.forEach(s => s.categories.forEach((c,ci) => c.items.forEach((_,ii) => {
    totalMax += 5;
    totalScore += calcItemScore(getSelfScore(tid,s.id,ci,ii), getAdminScore(tid,s.id,ci,ii));
  })));
  return totalMax ? Math.round(totalScore / totalMax * 100) : 0;
}
function pCol(p) { return p>=70?'var(--green)':p>=40?'var(--amber)':'var(--red)'; }
function pFill(p) { return p>=70?'fill-green':p>=40?'fill-amber':'fill-red'; }
function initials(name) { const parts = name.split(/\s+/); return parts[0]?.slice(0,2)||name.slice(0,2); }

  if (wasMobile !== isMobile && userMode) applyLayout();
});

  document.body.classList.toggle('is-mobile', isMobile);

}

// ===== 新人の進捗ページ（自分だけ） =====
function renderMyProgress() {
  const t = TRAINEES.find(x=>x.id===currentTrainee);
  if (!t) { renderTraineeLogin(); return; }
  const overall = totalPct(currentTrainee);
  let totItems=0, doneItems=0;
  SHEETS_DATA.forEach(s=>s.categories.forEach((c,ci)=>c.items.forEach((_,ii)=>{ totItems++; if(getSelfScore(currentTrainee,s.id,ci,ii)>=3) doneItems++; })));

  let h = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <div style="width:40px;height:40px;border-radius:50%;background:var(--purple-bg);color:var(--purple);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">${initials(t.name)}</div>
    <div>
      <div style="font-weight:600;font-size:16px">${t.name}</div>
      <div style="font-size:12px;color:var(--text3)">${t.joined}入社</div>
    </div>
    <button onclick="currentTrainee=null;renderTraineeLogin()" style="margin-left:auto;background:transparent;border:1px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text2);cursor:pointer">変更</button>
  </div>
  <div class="summary-card">
    <div class="summary-name">全体進捗</div>
    <div class="summary-pct">${overall}%</div>
    <div class="summary-sub">${doneItems} / ${totItems} 項目を習得済み</div>
    <div class="summary-bar"><div class="summary-bar-fill" style="width:${overall}%"></div></div>
  </div>
  <div id="my-categories"></div>`;

  const el = document.getElementById('trainee-content');
  if (el) el.innerHTML = h;
  renderSheetTabNav();
  renderMyCategories();
}

function renderMyCategories() {
  const sheet = SHEETS_DATA.find(s=>s.id===currentSheet);
  if (!sheet) return;
  let h = `<div style="color:var(--text3);font-size:12px;margin-bottom:10px">${sheet.subtitle}</div>`;
  sheet.categories.forEach((cat, ci) => {
    let cDone=0;
    cat.items.forEach((_,ii) => { if(getSelfScore(currentTrainee,currentSheet,ci,ii)>=3) cDone++; });
    const cp = Math.round(cDone/cat.items.length*100);
    h += `<div class="cat-card" id="mcat-${ci}">
      <div class="cat-header">
        <div class="cat-name">${cat.name}</div>
        <div class="cat-bar-wrap"><div class="cat-bar"><div class="cat-bar-fill" id="mcb-${ci}" style="width:${cp}%"></div></div></div>
        <div class="cat-pct" id="mcp-${ci}">${cp}%</div>
      </div>
      <div class="cat-body">`;
    cat.items.forEach((item, ii) => {
      const self = getSelfScore(currentTrainee, currentSheet, ci, ii);
      const admin = getAdminScore(currentTrainee, currentSheet, ci, ii);
      h += `<div class="task-item">
        <div class="task-top">
          <div class="task-num">${ii+1}</div>
          <div class="task-text ${self>=5?'done':''}" id="mtt-${ci}-${ii}">${item}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:10px;color:var(--accent);font-weight:600;min-width:44px">自己評価</span>
            <div class="stars" id="mst-${ci}-${ii}">`;
      for(let n=1;n<=5;n++) h += `<div class="star self-star ${self>=n?'active':''}" onclick="setMyScore(${ci},${ii},${n})">${n}</div>`;
      h += `</div></div>`;
      if (admin > 0) {
        h += `<div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:10px;color:var(--green);font-weight:600;min-width:44px">チーフ</span>
            <div style="display:flex;gap:4px">`;
        for(let n=1;n<=5;n++) h += `<div class="star admin-star-disp ${admin>=n?'admin-active':''}">${n}</div>`;
        h += `</div></div>`;
      }
      h += `</div></div>`;
    });
    h += '</div></div>';
  });
  const catEl = document.getElementById('my-categories');
  if (catEl) catEl.innerHTML = h;
}

function setMyScore(ci, ii, val) {
  const cur = getSelfScore(currentTrainee, currentSheet, ci, ii);
  const nv = cur === val ? val-1 : val;
  setScoreData(currentTrainee, currentSheet, ci, ii, 'self', nv);
  dbSetScore(currentTrainee, currentSheet, ci, ii, nv, undefined).catch(()=>{});
  const stars = document.getElementById(`mst-${ci}-${ii}`);
  if (stars) stars.querySelectorAll('.star').forEach((el,i) => el.className='star self-star'+(nv>=i+1?' active':''));
  const tt = document.getElementById(`mtt-${ci}-${ii}`);
  if (tt) tt.className = 'task-text'+(nv>=5?' done':'');
  // カテゴリバー更新
  const sheet = SHEETS_DATA.find(s=>s.id===currentSheet);
  const cat = sheet.categories[ci];
  let totalScore=0; cat.items.forEach((_,i)=>{ const s=getSelfScore(currentTrainee,currentSheet,ci,i); const a=getAdminScore(currentTrainee,currentSheet,ci,i); totalScore += a>0?Math.round((s+a)/2):s; });
  const cp = Math.round(totalScore/(cat.items.length*5)*100);
  const cb = document.getElementById(`mcb-${ci}`); if(cb) cb.style.width=cp+'%';
  const cpEl = document.getElementById(`mcp-${ci}`); if(cpEl) cpEl.textContent=cp+'%';
}

function toggleMyCat(ci) { const el=document.getElementById(`mcat-${ci}`); if(el) el.classList.toggle('collapsed'); }

// ===== 教育者モード：PCとスマホで切替 =====
function renderAdminMainView() {
  isMobile = window.innerWidth < 640;
  const dm = document.getElementById('desktop-main');
  const mc = document.getElementById('mobile-content');
  const dt = document.getElementById('desktop-tabs');
  const mn = document.getElementById('mobile-nav');

  if (isMobile) {
    if (dm) dm.style.display = 'none';
    if (dt) dt.style.display = 'none';
    if (mn) mn.style.display = 'block';
    if (mc) {
      mc.style.display = 'block';
      mc.innerHTML = '';
      const div = document.createElement('div');
      div.id = 'view-' + currentView;
      mc.appendChild(div);
      if (currentView === 'trainee') renderTraineeView();
      else if (currentView === 'admin') renderAdminView();
      else if (currentView === 'settings') renderSettingsView();
    }
  } else {
    if (dm) { dm.style.display = 'flex'; dm.style.flex = '1'; dm.style.overflow = 'hidden'; }
    if (dt) dt.style.display = 'flex';
    if (mc) mc.style.display = 'none';
    if (mn) mn.style.display = 'none';
    // PCのview切替
    ['trainee','admin','settings'].forEach(v => {
      const el = document.getElementById('view-'+v);
      if (el) el.style.display = v===currentView ? 'block' : 'none';
    });
    renderSidebar();
    if (currentView === 'trainee') renderTraineeView();
    else if (currentView === 'admin') renderAdminView();
    else if (currentView === 'settings') renderSettingsView();
  }
}

function switchView(v) {
  currentView = v;
  // デスクトップタブ更新
  ['trainee','admin','settings'].forEach(tab => {
    const el = document.getElementById('dtab-'+tab);
    if (el) el.className = 'view-btn' + (tab===v?' active':'');
  });
  // モバイルナビ更新
  ['trainee','admin','settings'].forEach(tab => {
    const el = document.getElementById('nav-'+tab);
    if (el) el.className = 'nav-btn' + (tab===v?' active':'');
  });
  renderAdminMainView();
}

// ===== SIDEBAR（PC用） =====
function renderSidebar() {
  const el = document.getElementById('sidebar');
  if (!el) return;
  if (currentView === 'settings') { el.innerHTML = ''; return; }
  if (currentView === 'trainee') {
    let h = '<div class="sb-section">衛生士</div>';
    TRAINEES.forEach(t => {
      const p = totalPct(t.id);
      h += `<div class="sb-item ${t.id===currentTrainee?'active':''}" onclick="selTrainee('${t.id}')">
        <span>${t.name}</span>
        <span class="sb-pct" style="color:${pCol(p)}">${p}%</span>
      </div>`;
    });
    el.innerHTML = h;
  } else {
    el.innerHTML = '<div class="sb-section">全体管理</div><div class="sb-item active">ダッシュボード</div>';
  }
}

      </div>
      <div class="overall-bar"><div class="overall-fill ${pFill(p)}" style="width:${p}%"></div></div>
    </div>`;
  });
  h += '</div><div class="detail-panel">';
  const t = TRAINEES.find(x=>x.id===adminSelected);
  const p = totalPct(adminSelected);
  let tot=0,dn=0;
  SHEETS_DATA.forEach(s=>s.categories.forEach((c,ci)=>c.items.forEach((_,ii)=>{ tot++; if(calcItemScore(getSelfScore(adminSelected,s.id,ci,ii),getAdminScore(adminSelected,s.id,ci,ii))>=4) dn++; })));
  h += `<div class="detail-top">
    <div class="avatar" style="width:50px;height:50px;font-size:14px">${initials(t.name)}</div>
    <div><div class="detail-name">${t.name}</div><div class="detail-sub">${t.joined}入社</div></div>
    <div style="margin-left:auto;text-align:right">
      <div style="font-size:26px;font-weight:700;color:${pCol(p)}">${p}%</div>
      <div style="font-size:12px;color:var(--text2)">${dn} / ${tot} 項目習得</div>
    </div>
  </div>`;

  // グラフ：シート別進捗バー
  h += `<div style="background:var(--surface2);border-radius:var(--radius);padding:14px;margin-bottom:14px">
    <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px">📊 シート別進捗</div>`;
  SHEETS_DATA.forEach(s => {
    const sp = sheetPct(adminSelected, s.id);
    const fc = pCol(sp);
    h += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
      <div style="font-size:11px;min-width:90px;color:var(--text2)">${s.title}</div>
      <div style="flex:1;height:14px;background:var(--surface);border-radius:7px;overflow:hidden;position:relative">
        <div style="height:100%;border-radius:7px;background:${fc};width:${sp}%;transition:width .5s"></div>
      </div>
      <div style="font-size:11px;font-weight:700;min-width:32px;text-align:right;color:${fc}">${sp}%</div>
    </div>`;
  });
  h += '</div>';

  // グラフ：3種評価棒グラフ
  const selfAvg  = (()=>{ let s=0,c=0; SHEETS_DATA.forEach(sh=>sh.categories.forEach((cat,ci)=>cat.items.forEach((_,ii)=>{ s+=getSelfScore(adminSelected,sh.id,ci,ii);c++; }))); return c?Math.round(s/c*20):0; })();
  const adminAvg = (()=>{ let s=0,c=0; SHEETS_DATA.forEach(sh=>sh.categories.forEach((cat,ci)=>cat.items.forEach((_,ii)=>{ s+=getAdminScore(adminSelected,sh.id,ci,ii);c++; }))); return c?Math.round(s/c*20):0; })();
  h += `<div style="background:var(--surface2);border-radius:var(--radius);padding:14px;margin-bottom:14px">
    <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px">👥 評価者別 平均スコア</div>
    <div style="display:flex;gap:10px;align-items:flex-end;height:70px;margin-bottom:6px">`;
  [{label:'セルフ',val:selfAvg,col:'var(--accent)'},{label:'チーフ',val:adminAvg,col:'var(--green)'}].forEach(item=>{
    h += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="font-size:12px;font-weight:700;color:${item.col}">${item.val}%</div>
      <div style="width:100%;border-radius:4px 4px 0 0;background:${item.col};height:${Math.max(item.val*0.55,2)}px"></div>
    </div>`;
  });
  h += `</div><div style="display:flex;gap:10px">
    <div style="flex:1;text-align:center;font-size:11px;color:var(--text3)">セルフ</div>
    <div style="flex:1;text-align:center;font-size:11px;color:var(--text3)">チーフ</div>
  </div></div>`;

  // グラフ：スタッフ比較
  h += `<div style="background:var(--surface2);border-radius:var(--radius);padding:14px;margin-bottom:14px">
    <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px">🏆 スタッフ進捗比較</div>`;
  TRAINEES.forEach(tr=>{
    const tp=totalPct(tr.id); const tc=pCol(tp); const isSel=tr.id===adminSelected;
    h += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;cursor:pointer" onclick="selAdmin('${tr.id}')">
      <div style="width:26px;height:26px;border-radius:50%;background:var(--purple-bg);color:var(--purple);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;${isSel?'border:2px solid var(--accent)':''}">${initials(tr.name)}</div>
      <div style="font-size:12px;min-width:60px;font-weight:${isSel?700:400}">${tr.name.split(/\s+/)[0]}</div>
      <div style="flex:1;height:12px;background:var(--surface);border-radius:6px;overflow:hidden">
        <div style="height:100%;border-radius:6px;background:${tc};width:${tp}%"></div>
      </div>
      <div style="font-size:11px;font-weight:700;min-width:32px;text-align:right;color:${tc}">${tp}%</div>
    </div>`;
  });
  h += '</div>';
  SHEETS_DATA.forEach(s => {
    h += `<div class="ast-sheet"><div class="ast-header">${s.title}｜${s.subtitle}</div>`;
    s.categories.forEach((cat,ci) => {
      h += `<div class="ast-cat-name">${cat.name}</div>`;
      cat.items.forEach((item,ii) => {
        const self = getSelfScore(adminSelected, s.id, ci, ii);
        const admin = getAdminScore(adminSelected, s.id, ci, ii);
        const avg = calcItemScore(self, admin);
        const dc = avg>=4?'dot-g':avg>=2?'dot-a':'dot-x';
        const bd = avg>=4?'b-done':avg>=2?'b-wip':'b-todo';
        const bl = avg>=4?'習得':avg>=2?'練習中':'未着手';
        const selfStars = [1,2,3,4,5].map(n=>`<span class="s-star ${self>=n?'on':'off'}">★</span>`).join('');
        const adminStars = [1,2,3,4,5].map(n=>`<span class="s-star ${admin>=n?'admin-on':'off'}">★</span>`).join('');
        h += `<div class="ast-item">
          <div class="dot ${dc}"></div>
          <div style="flex:1;font-size:13px">${item}</div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
            <div style="display:flex;align-items:center;gap:4px"><span style="font-size:9px;color:var(--accent)">自己</span>${selfStars}</div>
            <div style="display:flex;align-items:center;gap:4px"><span style="font-size:9px;color:var(--green)">チーフ</span>${adminStars}</div>
          </div>
          <span class="badge ${bd}" style="margin-left:6px">${bl}</span>
        </div>`;
      });
    });
    h += '</div>';
  });
  h += '</div></div>';
  // view-adminがあればそこへ、なければmobile-contentへ
  const target = document.getElementById('view-admin') || document.getElementById('mobile-content');
  if (target) target.innerHTML = h;
}
function selAdmin(id) { adminSelected=id; renderAdminView(); }

// ===== SETTINGS VIEW =====
function renderSettingsView() {
  if (!settingsSheet) settingsSheet = SHEETS_DATA[0]?.id;
  const sheet = SHEETS_DATA.find(s=>s.id===settingsSheet);
  const sIdx = SHEETS_DATA.findIndex(s=>s.id===settingsSheet);

  let h = `
  <div class="info-box">
    💡 <strong>2通りの編集方法</strong>：このページで直接編集するか、Claudeに「〇〇を追加して」とチャットで依頼することができます。どちらで変更しても結果は同じです。
  </div>
  <div class="settings-grid" style="display:flex;flex-direction:column;gap:0">

    <!-- 左列: 衛生士管理 -->
    <div>
      <div class="settings-section">
        <h2><span>👤</span> 衛生士の管理</h2>
        <div id="trainee-editor">`;

  TRAINEES.forEach((t, ti) => {
    h += `<div class="trainee-row">
      <div class="te-avatar">${initials(t.name)}</div>
      <div class="te-fields">
        <input type="text" value="${t.name}" placeholder="名前" oninput="updateTrainee(${ti},'name',this.value)">
        <div style="display:flex;gap:6px">
          <input type="text" value="${t.trainer}" placeholder="担当DH" oninput="updateTrainee(${ti},'trainer',this.value)" style="flex:1">
          <input type="text" value="${t.joined}" placeholder="入社年月" oninput="updateTrainee(${ti},'joined',this.value)" style="flex:1">
        </div>
      </div>
      <button class="btn btn-sm btn-danger" onclick="removeTrainee(${ti})">削除</button>
    </div>`;
  });

  h += `</div>
        <div style="margin-top:12px;display:flex;flex-direction:column;gap:8px">
          <input type="text" id="new-t-name" placeholder="名前（例：鈴木 はな）">
          <div style="display:flex;gap:6px">
            <input type="text" id="new-t-trainer" placeholder="担当DH" style="flex:1">
            <input type="text" id="new-t-joined" placeholder="入社年月" style="flex:1">
          </div>
          <button class="btn btn-primary" onclick="addTrainee()">+ 衛生士を追加</button>
        </div>
      </div>

      <!-- JSON インポート/エクスポート -->
      <div class="settings-section" style="margin-top:16px">
        <h2><span>📋</span> データのバックアップ・引き継ぎ</h2>
        <div style="font-size:12px;color:var(--text2);margin-bottom:8px">
          下のテキストをコピーして保存しておくと、別のPCでも同じデータを使えます。
        </div>
        <textarea class="json-area" id="json-export" readonly></textarea>
        <div class="btn-row">
          <button class="btn btn-sm" onclick="copyJson()">📋 コピー</button>
          <button class="btn btn-sm btn-danger" onclick="resetAll()">⚠ 全リセット</button>
        </div>
        <div style="font-size:12px;color:var(--text2);margin-top:12px;margin-bottom:6px">
          保存したデータをここに貼り付けて読み込み：
        </div>
        <textarea class="json-area" id="json-import" placeholder="ここにJSONを貼り付け..."></textarea>
        <div class="btn-row">
          <button class="btn btn-primary btn-sm" onclick="importJson()">読み込む</button>
        </div>
      </div>
    </div>

    <!-- 右列: 項目管理 -->
    <div class="settings-section">
      <h2><span>📝</span> チェック項目の編集</h2>
      <div class="sheet-selector">`;

  SHEETS_DATA.forEach(s => {
    h += `<button class="ss-btn ${s.id===settingsSheet?'active':''}" onclick="selSettingsSheet('${s.id}')">${s.title}</button>`;
  });

  h += `</div>
      <div style="margin-bottom:12px;display:flex;align-items:center;gap:8px">
        <div style="font-size:13px;font-weight:600">${sheet.title}</div>
        <input type="text" value="${sheet.subtitle}" placeholder="サブタイトル" oninput="updateSheetSubtitle(${sIdx},this.value)" style="flex:1;font-size:12px">
      </div>`;

  sheet.categories.forEach((cat, ci) => {
    h += `<div class="edit-cat">
      <div class="edit-cat-header">
        <input type="text" value="${cat.name}" oninput="updateCatName(${sIdx},${ci},this.value)" style="font-weight:600;font-size:13px;background:transparent;border:none;border-bottom:1px solid var(--border2);border-radius:0;padding:2px 4px;flex:1">
        <button class="btn btn-sm btn-danger" onclick="removeCat(${sIdx},${ci})">削除</button>
      </div>
      <div class="edit-items">`;
    cat.items.forEach((item, ii) => {
      h += `<div class="edit-item-row">
        <span class="drag-handle">≡</span>
        <input type="text" value="${item}" oninput="updateItem(${sIdx},${ci},${ii},this.value)">
        <button class="btn btn-sm btn-danger" onclick="removeItem(${sIdx},${ci},${ii})">×</button>
      </div>`;
    });
    h += `<div style="margin-top:6px;display:flex;gap:6px">
        <input type="text" id="ni-${ci}" placeholder="新しい項目を追加..." style="flex:1;font-size:12px">
        <button class="btn btn-sm btn-primary" onclick="addItem(${sIdx},${ci})">追加</button>
      </div>
      </div>
    </div>`;
  });

  h += `<div style="margin-top:12px;display:flex;gap:8px">
      <input type="text" id="new-cat-name" placeholder="新しいカテゴリ名" style="flex:1">
      <button class="btn btn-primary btn-sm" onclick="addCat(${sIdx})">+ カテゴリ追加</button>
    </div>
    </div>

  </div>`;

  const svEl = document.getElementById('view-settings') || document.getElementById('mobile-content'); if(svEl) svEl.innerHTML = h;

  // JSON export
  const exportData = { trainees: TRAINEES, sheets: SHEETS_DATA, scores };
  document.getElementById('json-export').value = JSON.stringify(exportData, null, 2);
}

// ===== SETTINGS ACTIONS =====
function updateTrainee(ti, key, val) {
  TRAINEES[ti][key] = val;
  if (key === 'name') TRAINEES[ti].initials = initials(val);
  saveAll(); renderSidebar();
}
function removeTrainee(ti) {
  if (!confirm(`「${TRAINEES[ti].name}」を削除しますか？\n（評価データも削除されます）`)) return;
  TRAINEES.splice(ti, 1);
  if (currentTrainee === TRAINEES[ti]?.id) currentTrainee = TRAINEES[0]?.id;
  saveAll(); renderSettingsView(); renderSidebar();
  toast('削除しました');
}
function addTrainee() {
  const name = document.getElementById('new-t-name').value.trim();
  const trainer = document.getElementById('new-t-trainer').value.trim();
  const joined = document.getElementById('new-t-joined').value.trim();
  if (!name) { toast('名前を入力してください'); return; }
  TRAINEES.push({ id: 't'+Date.now(), name, initials: initials(name), joined: joined||'', trainer: trainer||'' });
  saveAll(); renderSettingsView(); renderSidebar(); toast('追加しました');
}

function selSettingsSheet(id) { settingsSheet=id; renderSettingsView(); }
function updateSheetSubtitle(si, val) { SHEETS_DATA[si].subtitle=val; saveAll(); }
function updateCatName(si, ci, val) { SHEETS_DATA[si].categories[ci].name=val; saveAll(); }
function updateItem(si, ci, ii, val) { SHEETS_DATA[si].categories[ci].items[ii]=val; saveAll(); }
function removeItem(si, ci, ii) {
  SHEETS_DATA[si].categories[ci].items.splice(ii,1);
  saveAll(); renderSettingsView(); toast('削除しました');
}
function addItem(si, ci) {
  const inp = document.getElementById(`ni-${ci}`);
  const val = inp?.value.trim();
  if (!val) return;
  SHEETS_DATA[si].categories[ci].items.push(val);
  saveAll(); renderSettingsView(); toast('追加しました');
}
function removeCat(si, ci) {
  if (!confirm(`「${SHEETS_DATA[si].categories[ci].name}」カテゴリを削除しますか？`)) return;
  SHEETS_DATA[si].categories.splice(ci,1);
  saveAll(); renderSettingsView(); toast('削除しました');
}
function addCat(si) {
  const inp = document.getElementById('new-cat-name');
  const val = inp?.value.trim();
  if (!val) return;
  SHEETS_DATA[si].categories.push({ name: val, items: [] });
  saveAll(); renderSettingsView(); toast('カテゴリを追加しました');
}

function copyJson() {
  const ta = document.getElementById('json-export');
  navigator.clipboard.writeText(ta.value).then(() => toast('クリップボードにコピーしました'));
}
function importJson() {
  const val = document.getElementById('json-import').value.trim();
  if (!val) return;
  try {
    const d = JSON.parse(val);
    if (d.trainees) TRAINEES = d.trainees;
    if (d.sheets) SHEETS_DATA = d.sheets;
    if (d.scores) Object.assign(scores, d.scores);
    saveAll(); renderSettingsView(); renderSidebar?.(); toast('データを読み込みました');
  } catch(e) { toast('JSONの形式が正しくありません'); }
}
function resetAll() {
  if (!confirm('全データをリセットしますか？\n（評価スコアや設定変更がすべて消えます）')) return;
  localStorage.removeItem('skillcheck_v3_cache');
  Promise.all([
    dbSetSetting('trainees', DEFAULT_TRAINEES),
    dbSetSetting('sheets', DEFAULT_SHEETS),
    sbFetch('/rest/v1/scores', { method: 'DELETE', headers: { 'Prefer': '' } })
  ]).then(() => {
    TRAINEES = JSON.parse(JSON.stringify(DEFAULT_TRAINEES));
    SHEETS_DATA = JSON.parse(JSON.stringify(DEFAULT_SHEETS));
    Object.keys(scores).forEach(k => delete scores[k]);
    renderSettingsView(); renderSidebar?.(); toast('リセットしました');
  }).catch(e => toast('リセットエラー: ' + e.message));
}

// ===== TOAST =====
function toast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ===== INIT =====
(async () => {
  await loadAll();
  renderLogin();
})();
</script>
</body>
</html>
